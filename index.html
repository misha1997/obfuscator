<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bypass · затемнение</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* ----- reset + base ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0d0d14;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #e3e3f0;
    }

    /* ----- карточка ----- */
    .card {
      max-width: 820px;
      width: 100%;
      background: #14141e;
      border-radius: 48px;
      padding: 40px 40px 30px;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.03);
      transition: 0.3s;
      border: 1px solid #28283a;
    }

    /* ----- хедер ----- */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 12px 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(145deg, #7c3aed, #db2777);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: white;
      box-shadow: 0 8px 24px rgba(124, 58, 237, 0.25);
    }

    .logo-text h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, #c4b5fd, #f9a8d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-text span {
      font-size: 0.8rem;
      opacity: 0.5;
      display: block;
      margin-top: 2px;
      letter-spacing: 0.3px;
    }

    .telegram-btn {
      background: #1f2a3a;
      border: none;
      padding: 12px 24px;
      border-radius: 60px;
      color: #e0e8f0;
      font-weight: 600;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid #2f3f55;
    }

    .telegram-btn i {
      color: #3b9eff;
      font-size: 1.2rem;
    }

    .telegram-btn:hover {
      background: #25364a;
      border-color: #3b9eff;
      transform: scale(1.02);
      box-shadow: 0 8px 28px rgba(59, 158, 255, 0.15);
    }

    /* ----- поле ввода ----- */
    .input-area {
      margin-bottom: 28px;
    }

    .input-area label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      opacity: 0.5;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      height: 150px;
      background: #0c0c16;
      border: 1px solid #2a2a3e;
      border-radius: 28px;
      padding: 22px 26px;
      color: #eaeaff;
      font-size: 1rem;
      line-height: 1.6;
      resize: vertical;
      transition: 0.2s;
      font-family: 'Inter', system-ui, sans-serif;
    }

    textarea:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.2);
      outline: none;
    }

    /* ----- панель управления ----- */
    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 24px 32px;
      margin-bottom: 26px;
      background: #0e0e18;
      padding: 14px 20px;
      border-radius: 40px;
      border: 1px solid #232336;
    }

    .mode-group {
      display: flex;
      gap: 6px;
      background: #181825;
      padding: 4px;
      border-radius: 60px;
    }

    .mode-btn {
      padding: 8px 22px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.85rem;
      background: transparent;
      border: none;
      color: #8a8aa0;
      cursor: pointer;
      transition: 0.2s;
    }

    .mode-btn.active {
      background: #2a2a44;
      color: white;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
    }

    .mode-btn:not(.active):hover {
      color: #d0d0ea;
    }

    .slider-wrap {
      flex: 1;
      min-width: 150px;
    }

    .slider-wrap .slider-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      font-weight: 500;
      color: #9a9ab0;
      margin-bottom: 4px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 5px;
      background: #28283e;
      border-radius: 999px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: #c084fc;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid #1a1a2a;
      box-shadow: 0 0 0 1px #7c3aed;
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      background: #c084fc;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid #1a1a2a;
    }

    /* ----- кнопки действий ----- */
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 32px;
    }

    .btn {
      padding: 12px 28px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.95rem;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: 0.2s;
      background: #1c1c2e;
      color: #c8c8e0;
    }

    .btn-primary {
      background: linear-gradient(145deg, #7c3aed, #db2777);
      color: white;
      box-shadow: 0 6px 24px rgba(124, 58, 237, 0.25);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 34px rgba(124, 58, 237, 0.35);
    }

    .btn-secondary {
      background: #1c1c2e;
      border: 1px solid #2e2e48;
    }

    .btn-secondary:hover {
      background: #282840;
      border-color: #4a4a6a;
    }

    .btn-telegram {
      background: #1a2b3f;
      border: 1px solid #2c4a66;
      color: #b0d0ff;
    }

    .btn-telegram:hover {
      background: #1f3450;
      border-color: #3b9eff;
    }

    .btn-telegram i {
      color: #3b9eff;
    }

    /* ----- результат ----- */
    .result-area {
      margin-top: 6px;
    }

    .result-area .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .result-area .result-header h3 {
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      opacity: 0.5;
      text-transform: uppercase;
    }

    .result-box {
      background: #0a0a14;
      border: 1px solid #24243a;
      border-radius: 28px;
      padding: 24px 28px;
      min-height: 110px;
      font-size: 1rem;
      line-height: 1.7;
      word-break: break-all;
      color: #dedef0;
      transition: 0.2s;
    }

    .status {
      margin-top: 12px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0.6;
    }

    .status i {
      font-size: 0.5rem;
      color: #7c3aed;
    }

    /* ----- футер ----- */
    .footer {
      margin-top: 30px;
      text-align: center;
      font-size: 0.7rem;
      opacity: 0.25;
      letter-spacing: 0.6px;
      border-top: 1px solid #1e1e30;
      padding-top: 20px;
    }

    /* адаптив */
    @media (max-width: 640px) {
      .card { padding: 24px 18px; }
      .header { flex-direction: column; align-items: stretch; }
      .telegram-btn { justify-content: center; }
      .controls { flex-direction: column; align-items: stretch; border-radius: 28px; }
      .mode-group { justify-content: center; }
      .actions { flex-direction: column; }
      .btn { justify-content: center; }
    }
  </style>
</head>
<body>

<div class="card">

  <!-- header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon"><i class="fas fa-eye-slash"></i></div>
      <div class="logo-text">
        <h1>Bypass</h1>
        <span>обфускация · модерация</span>
      </div>
    </div>
    <button class="telegram-btn" onclick="window.open('https://t.me/tiktokbypass_bot', '_blank')">
      <i class="fab fa-telegram-plane"></i> Telegram Bot
    </button>
  </div>

  <!-- input -->
  <div class="input-area">
    <label><i class="far fa-file-alt"></i> Исходный текст</label>
    <textarea id="inputText" placeholder="Вставьте текст для обфускации...">Привет друзья! Сегодня я покажу очень крутой способ, который реально работает в 2026 году 🔥</textarea>
  </div>

  <!-- controls -->
  <div class="controls">
    <div class="mode-group" id="modeGroup">
      <button class="mode-btn active" data-mode="tiktok">TikTok</button>
      <button class="mode-btn" data-mode="strange">Странный</button>
      <button class="mode-btn" data-mode="max">Макс</button>
    </div>

    <div class="slider-wrap">
      <div class="slider-label">
        <span>Интенсивность</span>
        <span id="intensityDisplay">75%</span>
      </div>
      <input type="range" id="intensitySlider" min="30" max="95" value="75" />
    </div>
  </div>

  <!-- actions -->
  <div class="actions">
    <button class="btn btn-primary" id="bypassBtn"><i class="fas fa-wand-magic-sparkles"></i> Преобразовать</button>
    <button class="btn btn-secondary" id="copyBtn"><i class="fas fa-copy"></i> Копировать</button>
    <button class="btn btn-secondary" id="clearBtn"><i class="fas fa-eraser"></i> Очистить</button>
  </div>

  <!-- result -->
  <div class="result-area">
    <div class="result-header">
      <h3><i class="far fa-copy"></i> Результат</h3>
    </div>
    <div class="result-box" id="resultBox">Здесь будет преобразованный текст...</div>
    <div class="status" id="statusLine">
      <i class="fas fa-circle"></i> готово
    </div>
  </div>

  <!-- <div class="footer">
    homoglyphs · zero‑width · diacritics
  </div> -->
</div>

<script>
  (function() {
    // ----- конфиг -----
    const zwsp = '\u200B';
    const diacritics = ['\u0301','\u0302','\u0303','\u0304','\u0306','\u0307','\u0308','\u030A','\u030C'];

    const homoglyphMap = {
      'а':'а','е':'е','о':'о','с':'с','р':'р','к':'к',
      'x':'х','y':'у','p':'р','c':'с','o':'о','a':'а',
      'h':'һ','m':'м','n':'п','b':'в','e':'е','t':'т'
    };

    // ----- DOM -----
    const inputEl = document.getElementById('inputText');
    const resultBox = document.getElementById('resultBox');
    const statusLine = document.getElementById('statusLine');

    const modeBtns = document.querySelectorAll('.mode-btn');
    const intensitySlider = document.getElementById('intensitySlider');
    const intensityDisplay = document.getElementById('intensityDisplay');

    const bypassBtn = document.getElementById('bypassBtn');
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');

    let currentMode = 'tiktok';

    // ----- режимы -----
    modeBtns.forEach(btn => {
      btn.addEventListener('click', function() {
        modeBtns.forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentMode = this.dataset.mode;
        updateStatus(`режим: ${this.textContent}`, '#7c3aed');
      });
    });

    // ----- ползунок -----
    intensitySlider.addEventListener('input', function() {
      intensityDisplay.textContent = this.value + '%';
    });

    // ----- утилиты -----
    function addDiacritic(char) {
      if (!char || char === ' ') return char;
      return char + diacritics[Math.floor(Math.random() * diacritics.length)];
    }

    function getHomoglyph(char) {
      const lower = char.toLowerCase();
      return homoglyphMap[lower] || lower;
    }

    function updateStatus(msg, color = '#7c3aed') {
      statusLine.innerHTML = `<i class="fas fa-circle" style="color:${color}; font-size:0.5rem;"></i> ${msg}`;
    }

    // ----- основной движок -----
    function bypass() {
      const raw = inputEl.value;
      if (!raw.trim()) {
        updateStatus('введите текст!', '#f97316');
        return;
      }

      const intensity = parseInt(intensitySlider.value) / 100;
      const mode = currentMode;
      let result = '';

      for (let char of raw) {
        if (char === ' ') {
          // пробелы: добавляем zwsp в зависимости от режима
          if (mode === 'max' || (mode === 'strange' && Math.random() > 0.5)) {
            result += ' ' + zwsp;
          } else {
            result += ' ';
          }
          continue;
        }

        // пропускаем с вероятностью (интенсивность)
        if (Math.random() > intensity) {
          result += char;
          continue;
        }

        let processed = char;

        // 1. гомоглиф
        if (Math.random() > 0.35) {
          const h = getHomoglyph(char);
          if (h !== char.toLowerCase()) {
            processed = (char === char.toUpperCase()) ? h.toUpperCase() : h;
          }
        }

        // 2. диакритика
        if (mode === 'tiktok' || mode === 'max') {
          if (Math.random() > 0.5) processed = addDiacritic(processed);
        }
        if (mode === 'max' && Math.random() > 0.65) {
          processed = addDiacritic(processed);
        }

        // 3. zero-width
        if (mode === 'max' && Math.random() > 0.55) {
          processed += zwsp;
        } else if (mode === 'tiktok' && Math.random() > 0.7) {
          processed += zwsp;
        } else if (mode === 'strange' && Math.random() > 0.75) {
          processed += zwsp;
        }

        result += processed;
      }

      // дополнительная обработка для max: добавляем zwsp между всеми словами
      if (mode === 'max') {
        result = result.replace(/\s/g, ' ' + zwsp);
      }

      resultBox.textContent = result || '⚠️ пустой результат';
      updateStatus(`готово · ${result.length} симв.`, '#4ade80');
    }

    // ----- кнопки -----
    bypassBtn.addEventListener('click', bypass);

    copyBtn.addEventListener('click', function() {
      const text = resultBox.textContent;
      if (!text || text === 'Здесь будет преобразованный текст...') {
        updateStatus('нечего копировать', '#f97316');
        return;
      }
      navigator.clipboard.writeText(text).then(() => {
        updateStatus('скопировано!', '#4ade80');
      }).catch(() => {
        updateStatus('ошибка копирования', '#ef4444');
      });
    });

    clearBtn.addEventListener('click', function() {
      inputEl.value = '';
      resultBox.textContent = 'Здесь будет преобразованный текст...';
      updateStatus('очищено', '#6b7280');
    });

    // ----- инициализация: пример при загрузке -----
    window.addEventListener('load', function() {
      bypass();
    });

    // дополнительно: обработчик для быстрого пробела (Telegram Bot уже есть в хедере)
  })();
</script>

</body>
</html>
